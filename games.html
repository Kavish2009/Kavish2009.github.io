<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V2N — Games Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--fire:#FF4500;--gold:#FFD700;--neon:#00FFD1;--purple:#a855f7;--bg:#05070f;--surface:#0c1220;--surface2:#111827;--text:#eef0f8;--muted:#7a85a0;--muted2:#9aa3bc;--border:rgba(0,255,209,0.12);}
*{margin:0;padding:0;box-sizing:border-box;}body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--fire);border-radius:3px;}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,255,209,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,209,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;}
nav{position:fixed;top:0;width:100%;z-index:200;padding:0 40px;height:60px;display:flex;align-items:center;justify-content:space-between;background:rgba(5,7,15,0.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Orbitron';font-weight:900;font-size:1.4rem;color:var(--fire);text-decoration:none;}
.nav-logo span{color:var(--neon);}
.nav-link{font-family:'Share Tech Mono';font-size:0.72rem;color:var(--muted2);text-decoration:none;letter-spacing:0.08em;transition:color .2s;}
.nav-link:hover{color:var(--neon);}
.page{position:relative;z-index:1;padding-top:60px;}
.hero{text-align:center;padding:70px 20px 50px;background:linear-gradient(180deg,rgba(255,69,0,0.06) 0%,transparent 100%);border-bottom:1px solid var(--border);}
.hero-label{font-family:'Share Tech Mono';font-size:0.7rem;color:var(--neon);letter-spacing:0.22em;text-transform:uppercase;margin-bottom:12px;}
.hero-title{font-family:'Orbitron';font-size:clamp(2rem,6vw,4rem);font-weight:900;color:#fff;margin-bottom:10px;}
.hero-title span{color:var(--fire);}
.hero-desc{font-size:1rem;color:var(--muted2);max-width:500px;margin:0 auto;}
.games-section{max-width:1100px;margin:0 auto;padding:50px 24px 80px;}
.sec-title{font-family:'Orbitron';font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:24px;display:flex;align-items:center;gap:10px;}
.sec-title::before{content:'';width:3px;height:18px;background:var(--fire);}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:48px;}
.gc{background:var(--surface);border:1px solid var(--border);padding:28px 20px;text-align:center;cursor:pointer;transition:transform .3s,box-shadow .3s,border-color .3s;position:relative;overflow:hidden;}
.gc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--fire),transparent);opacity:0;transition:opacity .3s;}
.gc:hover{transform:translateY(-5px);box-shadow:0 20px 48px rgba(0,0,0,0.4);border-color:rgba(255,69,0,0.25);}
.gc:hover::before{opacity:1;}
.gc-emoji{font-size:3rem;margin-bottom:14px;display:block;}
.gc-name{font-family:'Orbitron';font-size:1rem;font-weight:700;color:#fff;margin-bottom:6px;}
.gc-status{font-family:'Share Tech Mono';font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;display:inline-block;}
.s-live{color:#00e05a;background:rgba(0,255,100,0.08);border:1px solid rgba(0,255,100,0.2);}
.s-maint{color:#FFA500;background:rgba(255,165,0,0.08);border:1px solid rgba(255,165,0,0.2);}
.s-soon{color:var(--purple);background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.2);}
.gc-overlay{position:fixed;inset:0;z-index:500;background:rgba(5,7,15,0.97);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(18px);}
.gc-overlay.active{opacity:1;pointer-events:all;}
.gc-modal{background:var(--surface);border:1px solid var(--border);max-width:480px;width:100%;padding:40px;text-align:center;position:relative;}
.gc-modal-close{position:absolute;top:14px;right:18px;background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;transition:color .2s;}
.gc-modal-close:hover{color:var(--fire);}
.gc-modal-emoji{font-size:4rem;margin-bottom:16px;}
.gc-modal-title{font-family:'Orbitron';font-size:1.5rem;font-weight:900;color:#fff;margin-bottom:8px;}
.gc-modal-status{font-family:'Share Tech Mono';font-size:0.75rem;color:var(--gold);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:16px;}
.gc-modal-desc{font-size:0.95rem;color:var(--muted2);line-height:1.7;margin-bottom:24px;}
.wa-btn{background:#25D366;color:#fff;border:none;padding:12px 28px;font-family:'Orbitron';font-size:0.75rem;font-weight:700;letter-spacing:0.1em;cursor:pointer;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);text-decoration:none;display:inline-block;transition:all .25s;}
.wa-btn:hover{background:#1ebe5c;}
.close-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:10px 24px;font-family:'Share Tech Mono';font-size:0.72rem;letter-spacing:0.1em;cursor:pointer;margin-top:10px;transition:all .2s;}
.close-btn:hover{border-color:var(--fire);color:var(--fire);}
@media(max-width:640px){nav{padding:0 16px;}.games-section{padding:40px 16px 60px;}}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">V2N<span>FF</span></a>
  <div style="display:flex;gap:20px;">
    <a class="nav-link" href="index.html#tournaments">Tournaments</a>
    <a class="nav-link" href="index.html">← Home</a>
  </div>
</nav>
<div class="page">
  <div class="hero">
    <div class="hero-label">V2N Gaming Hub</div>
    <h1 class="hero-title">MORE <span>GAMES</span> COMING SOON</h1>
    <p class="hero-desc">Free Fire is just the start. More tournaments across different games launching soon. Join the WhatsApp group to get notified first.</p>
  </div>
  <div class="games-section">
    <div class="sec-title">🔥 Available Now</div>
    <div class="games-grid" id="live-grid"></div>
    <div class="sec-title">⚙️ Under Maintenance</div>
    <div class="games-grid" id="maint-grid"></div>
    <div class="sec-title">◐ Coming Soon</div>
    <div class="games-grid" id="soon-grid"></div>
  </div>
</div>
<div class="gc-overlay" id="gc-overlay">
  <div class="gc-modal">
    <button class="gc-modal-close" onclick="closeOverlay()">✕</button>
    <div class="gc-modal-emoji" id="ov-emoji">🎮</div>
    <div class="gc-modal-title" id="ov-title">Game</div>
    <div class="gc-modal-status" id="ov-status">Status</div>
    <div class="gc-modal-desc" id="ov-desc"></div>
    <a class="wa-btn" href="https://chat.whatsapp.com/KqQaCiu2M4f4wwEVnK5yi9" target="_blank">📲 Join WhatsApp for Updates</a><br>
    <button class="close-btn" onclick="closeOverlay()">Close</button>
  </div>
</div>
<script>
const games=[
  {emoji:'🔥',name:'Free Fire',status:'live',statusLabel:'● LIVE NOW',desc:'Season 1 is running! 4v4 Squad Battle Royale with cash prizes. Register now for 1 April & 14 April 2026.',link:'index.html#tournaments'},
  {emoji:'🪖',name:'BGMI',status:'maint',statusLabel:'⚙ Under Maintenance',desc:'BGMI tournaments are being planned. Room setup, prize structures and squad formats are being configured. Coming very soon!'},
  {emoji:'🎯',name:'Valorant',status:'maint',statusLabel:'⚙ Under Maintenance',desc:'Valorant 5v5 tournaments in the works. Server region, map pool and format being finalised.'},
  {emoji:'💣',name:'COD Mobile',status:'maint',statusLabel:'⚙ Under Maintenance',desc:'Call of Duty Mobile battle royale and multiplayer tournaments coming. Prize pool design in progress.'},
  {emoji:'🔫',name:'PUBG',status:'soon',statusLabel:'◐ Coming Soon',desc:'PUBG squad tournaments planned for Season 2 alongside solo modes. Join WhatsApp to be notified first.'},
  {emoji:'♟️',name:'Chess',status:'soon',statusLabel:'◐ Coming Soon',desc:'V2N Chess tournaments for the strategy fans. Rapid and Blitz formats being considered. Coming in future seasons.'},
  {emoji:'🚀',name:'Rocket League',status:'soon',statusLabel:'◐ Coming Soon',desc:'3v3 Rocket League car soccer tournaments. Esports format with bracket-style playoffs coming soon.'},
];
const gridMap={live:'live-grid',maint:'maint-grid',soon:'soon-grid'};
const statusClass={live:'s-live',maint:'s-maint',soon:'s-soon'};
games.forEach((g,i)=>{
  const el=document.getElementById(gridMap[g.status]);
  if(!el)return;
  const card=document.createElement('div');
  card.className='gc';
  card.innerHTML=`<span class="gc-emoji">${g.emoji}</span><div class="gc-name">${g.name}</div><span class="gc-status ${statusClass[g.status]}">${g.statusLabel}</span>`;
  card.onclick=()=>{
    if(g.status==='live'&&g.link){window.location.href=g.link;return;}
    document.getElementById('ov-emoji').textContent=g.emoji;
    document.getElementById('ov-title').textContent=g.name;
    document.getElementById('ov-status').textContent=g.statusLabel;
    document.getElementById('ov-desc').textContent=g.desc;
    document.getElementById('gc-overlay').classList.add('active');
    document.body.style.overflow='hidden';
  };
  el.appendChild(card);
});
function closeOverlay(){document.getElementById('gc-overlay').classList.remove('active');document.body.style.overflow='';}
document.getElementById('gc-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeOverlay();});
</script>
</body>
</html>
