<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V2N — Player Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--fire:#FF4500;--gold:#FFD700;--neon:#00FFD1;--bg:#05070f;--surface:#0c1220;--surface2:#111827;--text:#eef0f8;--muted:#7a85a0;--muted2:#9aa3bc;--border:rgba(0,255,209,0.12);--glow:0 0 24px rgba(255,69,0,0.45);}
*{margin:0;padding:0;box-sizing:border-box;}body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--fire);border-radius:3px;}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,255,209,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,209,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;}
nav{position:fixed;top:0;width:100%;z-index:200;padding:0 40px;height:60px;display:flex;align-items:center;justify-content:space-between;background:rgba(5,7,15,0.9);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Orbitron';font-weight:900;font-size:1.4rem;color:var(--fire);text-decoration:none;text-shadow:0 0 28px rgba(255,69,0,0.5);}
.nav-logo span{color:var(--neon);}
.nav-links{display:flex;gap:20px;}
.nav-link{font-family:'Share Tech Mono';font-size:0.72rem;color:var(--muted2);text-decoration:none;letter-spacing:0.08em;transition:color .2s;}
.nav-link:hover{color:var(--neon);}
#loading-screen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.load-spinner{width:48px;height:48px;border:3px solid rgba(255,69,0,0.2);border-top-color:var(--fire);border-radius:50%;animation:spin .8s linear infinite;}
.load-text{font-family:'Share Tech Mono';font-size:0.8rem;color:var(--muted);letter-spacing:0.15em;}
@keyframes spin{to{transform:rotate(360deg);}}
#not-found{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px;position:relative;z-index:1;}
#profile-main{display:none;position:relative;z-index:1;padding-top:60px;}
.profile-hero{background:linear-gradient(135deg,rgba(255,69,0,0.08),rgba(0,255,209,0.04));border-bottom:1px solid var(--border);padding:40px;display:flex;align-items:center;gap:32px;flex-wrap:wrap;position:relative;overflow:hidden;}
.profile-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 20% 50%,rgba(255,69,0,0.06),transparent);}
.avatar-ring{width:100px;height:100px;border-radius:50%;border:3px solid var(--fire);padding:3px;background:linear-gradient(135deg,var(--fire),var(--gold));flex-shrink:0;position:relative;z-index:1;}
.avatar-inner{width:100%;height:100%;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-family:'Orbitron';font-weight:900;color:var(--fire);}
.profile-info{flex:1;min-width:200px;position:relative;z-index:1;}
.profile-name{font-family:'Orbitron';font-size:1.8rem;font-weight:900;color:#fff;margin-bottom:4px;}
.profile-email{font-family:'Share Tech Mono';font-size:0.78rem;color:var(--muted);margin-bottom:8px;}
.own-badge{display:inline-block;background:rgba(0,255,209,0.1);border:1px solid rgba(0,255,209,0.3);color:var(--neon);font-family:'Share Tech Mono';font-size:0.65rem;letter-spacing:0.15em;padding:3px 10px;text-transform:uppercase;margin-top:8px;}
.profile-stats-row{display:flex;gap:0;margin-left:auto;background:var(--surface);border:1px solid var(--border);align-self:center;position:relative;z-index:1;flex-wrap:wrap;}
.pstat{text-align:center;padding:16px 24px;border-right:1px solid var(--border);}
.pstat:last-child{border-right:none;}
.pstat-num{font-family:'Orbitron';font-size:1.6rem;font-weight:900;color:var(--gold);line-height:1;}
.pstat-label{font-size:0.65rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.profile-content{max-width:1000px;margin:0 auto;padding:40px 40px 60px;}
.section-head{display:flex;align-items:center;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.section-head h2{font-family:'Orbitron';font-size:1rem;font-weight:700;color:#fff;letter-spacing:0.05em;display:flex;align-items:center;gap:10px;}
.section-head h2::before{content:'';width:3px;height:18px;background:var(--fire);}
.hist-table{width:100%;border-collapse:collapse;}
.hist-table th{font-family:'Share Tech Mono';font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);}
.hist-table td{padding:12px 14px;font-size:0.9rem;border-bottom:1px solid rgba(255,255,255,0.04);}
.hist-table tr:hover td{background:rgba(0,255,209,0.03);}
.pos-badge{font-family:'Orbitron';font-size:0.8rem;font-weight:700;}
.pos-1{color:var(--gold);}.pos-2{color:#c0c0c0;}.pos-3{color:#cd7f32;}
.empty-state{text-align:center;padding:40px;color:var(--muted);font-family:'Share Tech Mono';font-size:0.8rem;line-height:2;}
.edit-section{background:var(--surface);border:1px solid var(--border);padding:24px;margin-top:32px;}
.edit-section h3{font-family:'Orbitron';font-size:0.85rem;color:var(--neon);margin-bottom:16px;}
.edit-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.edit-label{display:block;font-family:'Share Tech Mono';font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.edit-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;font-family:'Rajdhani';font-size:0.95rem;outline:none;transition:border-color .2s;}
.edit-input:focus{border-color:rgba(0,255,209,0.38);}
.save-btn{background:var(--fire);color:#fff;border:none;padding:10px 28px;font-family:'Orbitron';font-size:0.72rem;font-weight:700;letter-spacing:0.1em;cursor:pointer;clip-path:polygon(7px 0%,100% 0%,calc(100% - 7px) 100%,0% 100%);transition:all .25s;}
.save-btn:hover{background:#ff5500;box-shadow:var(--glow);}
.toast{position:fixed;bottom:28px;right:28px;z-index:9999;background:var(--surface);border:1px solid rgba(0,255,209,0.25);border-left:3px solid var(--neon);padding:13px 20px;font-family:'Rajdhani';font-size:0.92rem;color:var(--text);transform:translateX(120%);opacity:0;transition:all .3s;max-width:300px;}
.toast.show{transform:translateX(0);opacity:1;}
@media(max-width:768px){nav{padding:0 16px;}.profile-hero{flex-direction:column;padding:24px 16px;text-align:center;}.profile-stats-row{margin-left:0;width:100%;}.profile-content{padding:24px 16px 40px;}.edit-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">V2N<span>FF</span></a>
  <div class="nav-links">
    <a class="nav-link" href="players.html">👥 Find Players</a>
    <a class="nav-link" href="index.html">← Home</a>
  </div>
</nav>
<div id="loading-screen"><div class="load-spinner"></div><div class="load-text">Loading Profile...</div></div>
<div id="not-found" style="position:relative;z-index:1;">
  <div style="font-size:4rem;margin-bottom:16px">👤</div>
  <div style="font-family:'Orbitron';font-size:1.5rem;color:var(--fire);margin-bottom:8px">Profile Not Found</div>
  <div style="font-size:1rem;color:var(--muted2);margin-bottom:24px">This player doesn't exist or hasn't registered yet.</div>
  <a href="index.html" style="color:var(--neon);font-family:'Share Tech Mono';font-size:0.8rem">← Back to Home</a>
</div>
<div id="profile-main">
  <div class="profile-hero">
    <div class="avatar-ring"><div class="avatar-inner" id="avatar-letter">?</div></div>
    <div class="profile-info">
      <div class="profile-name" id="profile-display-name">Loading...</div>
      <div class="profile-email" id="profile-email-display"></div>
      <div style="font-size:.82rem;color:var(--muted2)" id="profile-ff"></div>
      <div class="own-badge" id="own-badge" style="display:none">✓ Your Profile</div>
    </div>
    <div class="profile-stats-row">
      <div class="pstat"><div class="pstat-num" id="stat-tournaments">0</div><div class="pstat-label">Tournaments</div></div>
      <div class="pstat"><div class="pstat-num" id="stat-wins">0</div><div class="pstat-label">Wins</div></div>
      <div class="pstat"><div class="pstat-num" id="stat-earnings">₹0</div><div class="pstat-label">Earned</div></div>
      <div class="pstat"><div class="pstat-num" id="stat-kills">0</div><div class="pstat-label">Kills</div></div>
    </div>
  </div>
  <div class="profile-content">
    <div class="section-head"><h2>Tournament History</h2></div>
    <div id="history-container"><div class="empty-state">🎮<br>No tournaments played yet.<br><a href="index.html#tournaments" style="color:var(--fire)">Register for Season 1 →</a></div></div>
    <div class="edit-section" id="edit-section" style="display:none">
      <h3>⚙️ Edit Your Profile</h3>
      <div class="edit-row">
        <div><label class="edit-label">Display Name</label><input class="edit-input" id="edit-name" type="text" placeholder="Your name"></div>
        <div><label class="edit-label">Free Fire Nickname</label><input class="edit-input" id="edit-ff-nick" type="text" placeholder="In-game name"></div>
      </div>
      <div class="edit-row">
        <div><label class="edit-label">Phone Number</label><input class="edit-input" id="edit-phone" type="tel" placeholder="10-digit number"></div>
        <div><label class="edit-label">State / Region</label><input class="edit-input" id="edit-state" type="text" placeholder="e.g. Tamil Nadu"></div>
      </div>
      <button class="save-btn" onclick="saveProfile()">💾 Save Changes</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SUPABASE_URL  = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON = 'YOUR_SUPABASE_ANON_KEY';
const _supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const params = new URLSearchParams(window.location.search);
const targetUID = params.get('uid');
function initials(n){ return n?n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2):'?'; }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

async function init(){
  const {data:{session}} = await _supa.auth.getSession();
  const uidToLoad = targetUID || (session?.user?.id) || null;
  if(!uidToLoad){ document.getElementById('loading-screen').style.display='none'; document.getElementById('not-found').style.display='flex'; return; }
  const {data:profile,error} = await _supa.from('profiles').select('*').eq('id',uidToLoad).single();
  if(error||!profile){ document.getElementById('loading-screen').style.display='none'; document.getElementById('not-found').style.display='flex'; return; }
  const isOwn = session?.user?.id === uidToLoad;
  document.getElementById('avatar-letter').textContent = initials(profile.display_name||profile.email);
  document.getElementById('profile-display-name').textContent = profile.display_name||'Anonymous';
  document.getElementById('profile-email-display').textContent = isOwn ? (profile.email||'') : '***@***.com';
  document.getElementById('profile-ff').textContent = profile.ff_nickname ? '🎮 '+profile.ff_nickname : '';
  if(isOwn) document.getElementById('own-badge').style.display='inline-block';
  document.getElementById('stat-tournaments').textContent = profile.tournaments_played||0;
  document.getElementById('stat-wins').textContent = profile.wins||0;
  document.getElementById('stat-earnings').textContent = '₹'+(profile.total_earnings||0);
  document.getElementById('stat-kills').textContent = profile.total_kills||0;
  // Tournament history
  const {data:regs} = await _supa.from('registrations').select('*').eq('user_id',uidToLoad).order('created_at',{ascending:false});
  if(regs&&regs.length>0){
    const rows = regs.map(r=>{
      const pos=r.position; const earned=r.earned||0;
      const posCls=pos===1?'pos-1':pos===2?'pos-2':pos===3?'pos-3':'';
      const posLabel=pos===1?'🥇 1st':pos===2?'🥈 2nd':pos===3?'🥉 3rd':pos?pos+'th':'—';
      return `<tr><td style="font-size:.82rem;color:var(--muted2)">${r.tournament||'—'}</td><td style="font-weight:600;color:#fff">${r.team_name||'—'}</td><td><span class="pos-badge ${posCls}">${posLabel}</span></td><td style="color:${earned>0?'#00e05a':'var(--muted)'};font-family:'Share Tech Mono'">${earned>0?'₹'+earned:'—'}</td><td style="font-family:'Share Tech Mono';font-size:.75rem;color:var(--neon)">${r.reg_code||'—'}</td><td style="color:var(--muted);font-size:.8rem">${r.created_at?new Date(r.created_at).toLocaleDateString('en-IN'):'—'}</td></tr>`;
    }).join('');
    document.getElementById('history-container').innerHTML=`<table class="hist-table"><thead><tr><th>Tournament</th><th>Team</th><th>Position</th><th>Earnings</th><th>Reg Code</th><th>Date</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
  if(isOwn){
    document.getElementById('edit-section').style.display='block';
    document.getElementById('edit-name').value=profile.display_name||'';
    document.getElementById('edit-ff-nick').value=profile.ff_nickname||'';
    document.getElementById('edit-phone').value=profile.phone||'';
    document.getElementById('edit-state').value=profile.state||'';
  }
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('profile-main').style.display='block';

  window.saveProfile = async()=>{
    const name=document.getElementById('edit-name').value.trim();
    const {error} = await _supa.from('profiles').update({
      display_name:name,
      ff_nickname:document.getElementById('edit-ff-nick').value.trim(),
      phone:document.getElementById('edit-phone').value.trim(),
      state:document.getElementById('edit-state').value.trim(),
    }).eq('id',uidToLoad);
    if(error){showToast('❌ '+error.message);return;}
    document.getElementById('profile-display-name').textContent=name;
    document.getElementById('avatar-letter').textContent=initials(name);
    showToast('✅ Profile updated!');
  };
}
init();
</script>
</body>
</html>
