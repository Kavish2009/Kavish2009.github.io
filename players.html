<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V2N — Find Players</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--fire:#FF4500;--gold:#FFD700;--neon:#00FFD1;--bg:#05070f;--surface:#0c1220;--surface2:#111827;--text:#eef0f8;--muted:#7a85a0;--muted2:#9aa3bc;--border:rgba(0,255,209,0.12);--glow:0 0 24px rgba(255,69,0,0.45);}
*{margin:0;padding:0;box-sizing:border-box;}body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--fire);border-radius:3px;}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,255,209,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,209,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;}
nav{position:fixed;top:0;width:100%;z-index:200;padding:0 40px;height:60px;display:flex;align-items:center;justify-content:space-between;background:rgba(5,7,15,0.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Orbitron';font-weight:900;font-size:1.4rem;color:var(--fire);text-decoration:none;text-shadow:0 0 28px rgba(255,69,0,0.5);}
.nav-logo span{color:var(--neon);}
.nav-links{display:flex;gap:20px;}
.nav-link{font-family:'Share Tech Mono';font-size:0.72rem;color:var(--muted2);text-decoration:none;letter-spacing:0.08em;transition:color .2s;}
.nav-link:hover{color:var(--neon);}
.page{max-width:900px;margin:0 auto;padding:90px 24px 60px;position:relative;z-index:1;}
.page-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,255,209,0.07);border:1px solid rgba(0,255,209,0.2);padding:5px 16px;font-family:'Share Tech Mono';font-size:0.7rem;color:var(--neon);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:14px;}
.page-title{font-family:'Orbitron';font-weight:900;font-size:clamp(1.8rem,5vw,3.2rem);color:#fff;margin-bottom:8px;}
.page-title span{color:var(--fire);}
.page-desc{font-size:0.95rem;color:var(--muted2);line-height:1.6;margin-bottom:32px;}
.search-wrap{position:relative;margin-bottom:12px;}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:16px 56px 16px 20px;font-family:'Rajdhani';font-size:1.1rem;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:rgba(0,255,209,0.4);}
.search-input::placeholder{color:var(--muted);}
.search-icon{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:1.2rem;color:var(--muted);pointer-events:none;}
.search-btn{width:100%;padding:13px;background:var(--fire);color:#fff;border:none;font-family:'Orbitron';font-size:0.78rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:all .25s;margin-bottom:32px;}
.search-btn:hover{background:#ff5500;box-shadow:var(--glow);}
.results-label{font-family:'Share Tech Mono';font-size:0.7rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.results-label::before{content:'';width:24px;height:1px;background:var(--neon);}
.player-card{background:var(--surface);border:1px solid var(--border);padding:20px 22px;display:flex;align-items:center;gap:18px;margin-bottom:12px;text-decoration:none;color:inherit;transition:transform .25s,box-shadow .25s,border-color .25s;position:relative;overflow:hidden;}
.player-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--fire);transform:scaleY(0);transition:transform .25s;}
.player-card:hover{transform:translateX(4px);box-shadow:0 8px 32px rgba(0,0,0,0.35);border-color:rgba(0,255,209,0.2);}
.player-card:hover::before{transform:scaleY(1);}
.pc-avatar{width:52px;height:52px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--fire),var(--gold));display:flex;align-items:center;justify-content:center;font-family:'Orbitron';font-size:1.1rem;font-weight:900;color:#fff;border:2px solid rgba(255,255,255,0.1);}
.pc-info{flex:1;min-width:0;}
.pc-name{font-family:'Orbitron';font-size:1rem;font-weight:700;color:#fff;margin-bottom:3px;}
.pc-ff{font-family:'Share Tech Mono';font-size:0.72rem;color:var(--neon);margin-bottom:4px;}
.pc-meta{font-size:0.8rem;color:var(--muted2);}
.pc-stats{display:flex;gap:20px;flex-shrink:0;}
.pc-stat{text-align:center;}
.pc-stat-num{font-family:'Orbitron';font-size:1rem;font-weight:700;color:var(--gold);line-height:1;}
.pc-stat-label{font-size:0.6rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px;}
.state-box{text-align:center;padding:48px 20px;}
.state-icon{font-size:3rem;margin-bottom:14px;}
.state-title{font-family:'Orbitron';font-size:1rem;color:var(--muted2);margin-bottom:8px;}
.loading-dots{display:flex;gap:6px;justify-content:center;margin:40px 0;}
.loading-dots span{width:8px;height:8px;background:var(--fire);border-radius:50%;animation:dotbounce .8s ease-in-out infinite;}
.loading-dots span:nth-child(2){animation-delay:.15s;background:var(--gold);}
.loading-dots span:nth-child(3){animation-delay:.3s;background:var(--neon);}
@keyframes dotbounce{0%,80%,100%{transform:scale(0.6);opacity:.4;}40%{transform:scale(1);opacity:1;}}
.sec-divider{display:flex;align-items:center;gap:12px;margin:32px 0 20px;}
.sec-divider::before,.sec-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.sec-divider span{font-family:'Share Tech Mono';font-size:0.68rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;white-space:nowrap;}
@media(max-width:640px){nav{padding:0 16px;}.page{padding:80px 16px 50px;}.pc-stats{display:none;}}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">V2N<span>FF</span></a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">← Home</a>
    <a class="nav-link" href="profile.html">My Profile</a>
  </div>
</nav>
<div class="page">
  <div style="text-align:center;margin-bottom:36px;">
    <div class="page-badge">👥 Player Directory</div>
    <h1 class="page-title">Find <span>Players</span></h1>
    <p class="page-desc">Search by name or Free Fire nickname to find any V2N player's profile and tournament history.</p>
  </div>
  <div class="search-wrap"><input class="search-input" id="search-input" type="text" placeholder="Search by name or FF nickname..." onkeydown="if(event.key==='Enter')doSearch()"><span class="search-icon">🔍</span></div>
  <button class="search-btn" onclick="doSearch()">🔍 Search Players</button>
  <div id="results-area"></div>
  <div class="sec-divider"><span>All Registered Players</span></div>
  <div id="all-players-area"><div class="loading-dots"><span></span><span></span><span></span></div></div>
</div>
<script>
const SUPABASE_URL  = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON = 'YOUR_SUPABASE_ANON_KEY';
const _supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
let allPlayers = [];
let currentUID = null;
function initials(n){ return n?n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2):'?'; }

async function init(){
  const {data:{session}} = await _supa.auth.getSession();
  currentUID = session?.user?.id || null;
  const {data,error} = await _supa.from('profiles').select('*').order('created_at',{ascending:false});
  const el = document.getElementById('all-players-area');
  if(error||!data||data.length===0){ el.innerHTML='<div class="state-box"><div class="state-icon">😶</div><div class="state-title">No players yet. Be the first to register!</div></div>'; return; }
  allPlayers = data;
  el.innerHTML = `<div class="results-label">${data.length} player${data.length!==1?'s':''} registered</div>` + data.map(buildCard).join('');
}

function buildCard(p){
  const isYou = p.id===currentUID;
  const youTag = isYou?' <span style="color:var(--neon);font-size:.65rem;font-family:Share Tech Mono">(You)</span>':'';
  const ff = p.ff_nickname?`<div class="pc-ff">🎮 ${p.ff_nickname}</div>`:'';
  return `<a class="player-card" href="profile.html?uid=${p.id}">
    <div class="pc-avatar">${initials(p.display_name||p.email)}</div>
    <div class="pc-info"><div class="pc-name">${p.display_name||'Anonymous'}${youTag}</div>${ff}<div class="pc-meta">${p.state||''}</div></div>
    <div class="pc-stats">
      <div class="pc-stat"><div class="pc-stat-num">${p.tournaments_played||0}</div><div class="pc-stat-label">Played</div></div>
      <div class="pc-stat"><div class="pc-stat-num">${p.wins||0}</div><div class="pc-stat-label">Wins</div></div>
      <div class="pc-stat"><div class="pc-stat-num">₹${p.total_earnings||0}</div><div class="pc-stat-label">Earned</div></div>
    </div>
    <div style="color:var(--muted);font-size:1.1rem">→</div>
  </a>`;
}

window.doSearch = ()=>{
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const el = document.getElementById('results-area');
  if(!q){ el.innerHTML=''; return; }
  const matches = allPlayers.filter(p=>(p.display_name||'').toLowerCase().includes(q)||(p.ff_nickname||'').toLowerCase().includes(q));
  if(matches.length===0){ el.innerHTML=`<div class="state-box"><div class="state-icon">🔍</div><div class="state-title">No results for "${q}"</div></div>`; return; }
  el.innerHTML=`<div class="results-label">${matches.length} result${matches.length!==1?'s':''} for "${q}"</div>`+matches.map(buildCard).join('');
  el.scrollIntoView({behavior:'smooth',block:'start'});
};
init();
</script>
</body>
</html>
